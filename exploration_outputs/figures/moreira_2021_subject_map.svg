  <rect width="1600" height="1040" fill="#F6F2EA"/>

  <text x="72" y="68" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1F2A2E">Moreira 2021: Subject Data Map</text>
  <text x="72" y="102" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#4D5A5F">Study 2 / 16 subjects / phonemes + single-phoneme + Words / S01-S16</text>

  <rect x="520" y="128" width="560" height="160" rx="24" fill="#DDE7F6" stroke="#3C5772" stroke-width="2"/>
  <text x="552" y="172" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#23384A">2021 Subject View</text>
  <text x="552" y="208" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#23384A">subject: sub-Sxx</text>
  <text x="760" y="208" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#23384A">session: ses-02</text>
  <text x="552" y="240" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#23384A">3 EEG recordings / subject</text>
  <text x="760" y="240" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#23384A">3 tasks: phonemes / single / Words</text>

  <rect x="72" y="338" width="430" height="286" rx="22" fill="#FFFFFF" stroke="#59686D" stroke-width="2"/>
  <text x="100" y="380" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#223238">Raw BIDS Files</text>
  <text x="100" y="420" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#223238">S01 phonemes_eeg.edf</text>
  <text x="100" y="450" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#223238">S01 singlephoneme_eeg.edf</text>
  <text x="100" y="480" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#223238">S01 Words_eeg.edf</text>
  <text x="100" y="516" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#4D5A5F">each task has events.tsv / channels.tsv</text>
  <text x="100" y="542" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#4D5A5F">and eeg.json</text>
  <text x="100" y="570" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#4D5A5F">1 subject -&gt; 3 raw recording dirs</text>

  <rect x="72" y="654" width="430" height="286" rx="22" fill="#FFFFFF" stroke="#59686D" stroke-width="2"/>
  <text x="100" y="696" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#223238">Task Hierarchy</text>

  <rect x="100" y="724" width="374" height="54" rx="14" fill="#D9E8D5" stroke="#365142" stroke-width="1.8"/>
  <text x="122" y="758" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#24362D">single-phoneme</text>
  <text x="288" y="758" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#24362D">phoneme1 / 11 classes</text>

  <rect x="100" y="796" width="374" height="54" rx="14" fill="#F3E0C8" stroke="#7A5A2A" stroke-width="1.8"/>
