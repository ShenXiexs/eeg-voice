  <polyline points="598,822 614,790 630,808 646,776 662,830 678,784 694,814 710,786 726,798 742,770 758,806 774,792"
            fill="none" stroke="#3C5772" stroke-width="3"/>
  <text x="600" y="844" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#4D5A5F">*_full_overview.png</text>

  <rect x="816" y="730" width="208" height="124" rx="16" fill="#FBF8F1" stroke="#8B6C23" stroke-width="1.8"/>
