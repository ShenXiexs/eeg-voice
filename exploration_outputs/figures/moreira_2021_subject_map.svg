  <text x="578" y="420" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#223238">subjects: 16</text>
  <text x="770" y="420" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#223238">EDF files: 48</text>
  <text x="578" y="454" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#223238">phonemes rows: 3840</text>
  <text x="578" y="486" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#223238">single-phoneme rows: 3355</text>
  <text x="578" y="518" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#223238">Words rows: 3693</text>
  <text x="578" y="554" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#223238">export: 2000 Hz / 61 EEG channels</text>
  <text x="578" y="582" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#223238">6,734,000 samples / uV</text>
  <text x="578" y="610" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#4D5A5F">1 subject -&gt; 3 export dirs</text>

  <rect x="1100" y="338" width="428" height="286" rx="22" fill="#FFFFFF" stroke="#59686D" stroke-width="2"/>
  <text x="1128" y="380" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#223238">Full Export Dirs</text>
  <text x="1128" y="420" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#223238">S01 phonemes full_eeg.h5</text>
  <text x="1128" y="450" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#223238">S01 single full_eeg.h5</text>
  <text x="1128" y="480" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#223238">S01 Words full_eeg.h5</text>
  <text x="1128" y="516" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#4D5A5F">each task also has manifest / stats</text>
  <text x="1128" y="542" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#4D5A5F">overview / psd</text>
  <text x="1128" y="568" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#4D5A5F">1 subject = 3 export dirs</text>

  <rect x="548" y="654" width="504" height="286" rx="22" fill="#FFFFFF" stroke="#59686D" stroke-width="2"/>
  <text x="578" y="696" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#223238">Export Preview</text>

  <rect x="578" y="730" width="210" height="124" rx="16" fill="#F8FBFC" stroke="#6E8892" stroke-width="1.8"/>
