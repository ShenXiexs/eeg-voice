  <text x="196" y="902" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#563028">real / nonce + lexical base + phoneme1-3</text>

  <rect x="548" y="338" width="504" height="286" rx="22" fill="#FFFFFF" stroke="#59686D" stroke-width="2"/>
