  <text x="238" y="830" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#5D4216">phoneme1 + phoneme2 + articulation</text>

  <rect x="100" y="868" width="374" height="54" rx="14" fill="#F4D9D3" stroke="#714035" stroke-width="1.8"/>
