  <text x="838" y="784" font-family="Courier New, monospace" font-size="14" fill="#223238">sampling_frequency_hz: 2000</text>
  <text x="838" y="808" font-family="Courier New, monospace" font-size="14" fill="#223238">eeg_channel_count: 61</text>
  <text x="838" y="832" font-family="Courier New, monospace" font-size="14" fill="#223238">sample_count: 6734000</text>

  <rect x="1100" y="654" width="428" height="286" rx="22" fill="#FFFFFF" stroke="#59686D" stroke-width="2"/>
  <text x="1128" y="696" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#223238">events.tsv / JSON</text>
  <text x="1128" y="734" font-family="Courier New, monospace" font-size="16" fill="#223238">onset  duration  trial_type  category  phoneme1  phoneme2</text>
  <text x="1128" y="762" font-family="Courier New, monospace" font-size="16" fill="#223238">...    ...       stimulus    n/a       i         t</text>
  <text x="1128" y="790" font-family="Courier New, monospace" font-size="15" fill="#223238">Words links to phoneme3 and lexical base</text>
  <text x="1128" y="818" font-family="Courier New, monospace" font-size="16" fill="#223238">SamplingFrequency: 2000</text>
  <text x="1128" y="846" font-family="Courier New, monospace" font-size="16" fill="#223238">EEGReference: CPz</text>
  <text x="1128" y="874" font-family="Courier New, monospace" font-size="15" fill="#223238">Cap: WaveGuard 64-channel cap</text>

