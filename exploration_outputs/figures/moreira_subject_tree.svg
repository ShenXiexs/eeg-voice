  <text x="146" y="582" font-size="18" fill="#4D5A5F">1 subject -> 1 task set</text>

  <rect x="408" y="456" width="260" height="138" rx="18" fill="#FBF8F1" stroke="#8B6C23" stroke-width="1.8"/>
