  <rect x="1230" y="456" width="248" height="170" rx="18" fill="#FBF8F1" stroke="#8B6C23" stroke-width="1.8"/>
  <text x="1254" y="488" font-size="22" font-weight="700" fill="#223238">Raw set / recording</text>
  <text x="1254" y="520" font-size="18" fill="#223238">eeg.edf</text>
  <text x="1254" y="548" font-size="18" fill="#223238">events.tsv</text>
  <text x="1254" y="576" font-size="18" fill="#223238">channels.tsv / eeg.json</text>
