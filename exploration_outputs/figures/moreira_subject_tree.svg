  <text x="560" y="212" font-size="20" fill="#23384A">same acquisition family / 64-channel cap / 2000 Hz</text>

  <rect x="86" y="330" width="618" height="492" rx="24" fill="#FFFFFF" stroke="#59686D" stroke-width="2"/>
  <text x="122" y="382" font-size="30" font-weight="700" fill="#223238">2019 group</text>
  <text x="122" y="418" font-size="20" fill="#223238">P subjects: P01-P08</text>
  <text x="312" y="418" font-size="20" fill="#223238">session: ses-01</text>

  <rect x="122" y="456" width="256" height="138" rx="18" fill="#F8FBFC" stroke="#6E8892" stroke-width="1.8"/>
  <text x="146" y="488" font-size="22" font-weight="700" fill="#223238">Task block</text>
  <text x="146" y="522" font-size="19" fill="#223238">task: phonemes</text>
