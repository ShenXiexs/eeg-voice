  <rect width="1600" height="980" fill="#F6F2EA"/>

  <text x="68" y="68" font-size="34" font-weight="700" fill="#1F2A2E">Moreira EEG Dataset: Subject Tree</text>
  <text x="68" y="102" font-size="18" fill="#4D5A5F">2019 P subjects and 2021 S subjects in one structure view</text>

  <rect x="520" y="132" width="560" height="116" rx="24" fill="#DDE7F6" stroke="#3C5772" stroke-width="2"/>
