  <text x="1302" y="726" font-size="18" fill="#223238">channel_stats.csv</text>
  <text x="956" y="756" font-size="18" fill="#223238">overview.png / psd.png</text>

  <rect x="586" y="864" width="432" height="78" rx="18" fill="#E9EFEF" stroke="#6E8892" stroke-width="1.8"/>
  <text x="618" y="898" font-size="20" font-weight="700" fill="#223238">Shared export traits</text>
  <text x="618" y="926" font-size="18" fill="#223238">61 EEG channels in export / unit: uV / same export layout</text>

