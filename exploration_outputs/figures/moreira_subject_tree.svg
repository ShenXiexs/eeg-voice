  <text x="932" y="418" font-size="20" fill="#223238">S subjects: S01-S16</text>
  <text x="1122" y="418" font-size="20" fill="#223238">session: ses-02</text>

  <rect x="932" y="456" width="270" height="170" rx="18" fill="#F8FBFC" stroke="#6E8892" stroke-width="1.8"/>
