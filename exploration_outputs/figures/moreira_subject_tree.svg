  <text x="432" y="520" font-size="18" fill="#223238">eeg.edf</text>
  <text x="432" y="548" font-size="18" fill="#223238">events.tsv</text>
  <text x="432" y="576" font-size="18" fill="#223238">channels.tsv / eeg.json</text>

  <rect x="122" y="628" width="546" height="154" rx="18" fill="#FFFDF9" stroke="#6E8892" stroke-width="1.8"/>
